<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MinePlanner — Build Tracker</title>
  <style>
    :root {
      --bg:       #0f1117;
      --surface:  #1a1e2e;
      --border:   #2e3450;
      --accent:   #5dfc8d;
      --accent2:  #ffd84d;
      --danger:   #ff5e5e;
      --text:     #e8ecf4;
      --muted:    #6b7399;
      --pixel:    2px;
    }
    [data-theme="light"] {
      --bg:      #f0f2e8;
      --surface: #ffffff;
      --border:  #c8cdb8;
      --accent:  #1a7a3a;
      --accent2: #b8860b;
      --danger:  #c0392b;
      --text:    #1a1e2e;
      --muted:   #6b7399;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ══════════════════════════
       HEADER
    ══════════════════════════ */
    header {
      background: var(--surface);
      border-bottom: var(--pixel) solid var(--border);
      padding: 0 1.5rem;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .logo span { color: var(--accent2); }

    .search-bar {
      flex: 1;
      max-width: 360px;
      position: relative;
    }
    .search-bar input {
      width: 100%;
      background: var(--bg);
      border: var(--pixel) solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 0.85rem;
      padding: 0.45rem 0.9rem 0.45rem 2.2rem;
      outline: none;
    }
    .search-bar input:focus { border-color: var(--accent); }
    .search-bar input::placeholder { color: var(--muted); }
    .search-bar .icon {
      position: absolute;
      left: 0.65rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.85rem;
      pointer-events: none;
    }

    .header-actions { margin-left: auto; display: flex; gap: .6rem; }

    .btn-icon {
      background: var(--bg);
      border: var(--pixel) solid var(--border);
      color: var(--text);
      width: 34px; height: 34px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem;
      font-family: inherit;
    }
    .btn-icon:hover { border-color: var(--accent); color: var(--accent); }

    /* ══════════════════════════
       LAYOUT
    ══════════════════════════ */
    .app-body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ══════════════════════════
       SIDEBAR
    ══════════════════════════ */
    aside.sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: var(--pixel) solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .sidebar-header {
      padding: .75rem 1rem .5rem;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      border-bottom: var(--pixel) solid var(--border);
    }

    .filter-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: .35rem;
      padding: .65rem 1rem;
      border-bottom: var(--pixel) solid var(--border);
    }
    .filter-tab {
      font-family: inherit;
      font-size: 0.72rem;
      padding: .25rem .55rem;
      background: transparent;
      border: var(--pixel) solid var(--border);
      color: var(--muted);
      cursor: pointer;
    }
    .filter-tab:hover, .filter-tab.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    .build-list { flex: 1; padding: .5rem 0; }

    .build-item {
      display: flex;
      align-items: center;
      gap: .65rem;
      padding: .55rem 1rem;
      cursor: pointer;
      border-left: 3px solid transparent;
    }
    .build-item:hover { background: var(--bg); }
    .build-item.active {
      background: var(--bg);
      border-left-color: var(--accent);
    }
    .build-item .build-icon {
      width: 32px; height: 32px;
      background: var(--bg);
      border: var(--pixel) solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }
    .build-item .build-icon img {
      width: 100%; height: 100%;
      object-fit: cover;
      image-rendering: pixelated;
    }
    .build-item .build-icon .icon-placeholder {
      width: 100%; height: 100%;
      background: var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.6rem;
      color: var(--muted);
      font-weight: 600;
    }
    .build-item-info { min-width: 0; flex: 1; }
    .build-item-name {
      font-size: 0.78rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .build-item-cat {
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: .1rem;
    }

    .progress-mini {
      width: 100%;
      height: 3px;
      background: var(--border);
      margin-top: .3rem;
    }
    .progress-mini-fill {
      height: 100%;
      background: var(--accent);
    }

    /* ══════════════════════════
       MAIN CONTENT
    ══════════════════════════ */
    main.content {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ── Build Header ── */
    .build-header {
      display: flex;
      gap: 1.5rem;
      align-items: flex-start;
    }

    .preview-image {
      width: 180px;
      height: 140px;
      flex-shrink: 0;
      border: var(--pixel) solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .preview-image img {
      width: 100%; height: 100%;
      object-fit: cover;
      image-rendering: pixelated;
    }
    .preview-image .img-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .4rem;
      color: var(--muted);
      font-size: 0.72rem;
    }
    .preview-image .img-placeholder svg {
      width: 40px; height: 40px;
      opacity: .4;
    }

    .build-meta { flex: 1; }
    .build-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: .4rem;
    }
    .build-category {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      padding: .2rem .55rem;
      border: var(--pixel) solid var(--accent2);
      color: var(--accent2);
      margin-bottom: .75rem;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .build-desc {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 1rem;
    }

    /* ── Progress Bar ── */
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: .35rem;
      font-weight: 500;
    }
    .progress-label span:last-child { color: var(--accent); font-weight: 700; }
    .progress-track {
      height: 12px;
      background: var(--bg);
      border: var(--pixel) solid var(--border);
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
    }

    /* ── Section Title ── */
    .section-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
      padding-bottom: .5rem;
      border-bottom: var(--pixel) solid var(--border);
      margin-bottom: .75rem;
    }

    /* ── Material List ── */
    .material-list {
      display: flex;
      flex-direction: column;
      gap: .4rem;
    }

    .material-card {
      display: flex;
      align-items: center;
      gap: .9rem;
      padding: .65rem .9rem;
      background: var(--surface);
      border: var(--pixel) solid var(--border);
      cursor: pointer;
    }
    .material-card:hover { border-color: var(--muted); }
    .material-card.done { opacity: .55; }
    .material-card.done .mat-name { text-decoration: line-through; color: var(--muted); }

    .mat-checkbox {
      width: 18px; height: 18px;
      border: var(--pixel) solid var(--border);
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: .75rem;
      color: var(--accent);
    }
    .material-card:hover .mat-checkbox { border-color: var(--accent); }
    .material-card.done .mat-checkbox { background: var(--accent); border-color: var(--accent); color: var(--bg); }

    .mat-icon {
      width: 36px; height: 36px;
      background: var(--bg);
      border: var(--pixel) solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }
    .mat-icon img {
      width: 100%; height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
    }
    .mat-icon .mat-icon-placeholder {
      width: 100%; height: 100%;
      background: var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.6rem;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 0;
    }

    .mat-info { flex: 1; }
    .mat-name { font-size: 0.82rem; font-weight: 600; }
    .mat-qty {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: .12rem;
    }
    .mat-qty b { color: var(--accent); }

    .mat-bar-wrap { width: 90px; }
    .mat-bar-track {
      height: 6px;
      background: var(--bg);
      border: 1px solid var(--border);
    }
    .mat-bar-fill { height: 100%; background: var(--accent2); }
    .mat-bar-pct {
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: .2rem;
      text-align: right;
    }

    /* ── Stats Row ── */
    .stats-row {
      display: flex;
      gap: .75rem;
      flex-wrap: wrap;
    }
    .stat-card {
      background: var(--surface);
      border: var(--pixel) solid var(--border);
      padding: .65rem 1rem;
      flex: 1;
      min-width: 110px;
    }
    .stat-label {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--muted);
      margin-bottom: .3rem;
    }
    .stat-value {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
    }

    /* ══════════════════════════
       FOOTER
    ══════════════════════════ */
    footer {
      background: var(--surface);
      border-top: var(--pixel) solid var(--border);
      padding: .6rem 1.5rem;
      font-size: 0.72rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    footer span { color: var(--accent); }

    /* ══════════════════════════
       SCROLLBAR
    ══════════════════════════ */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  </style>
</head>
<body>

  <!-- ══ HEADER ══ -->
  <header>
    <div class="logo">Mine<span>Planner</span></div>

    <div class="search-bar">
      <span class="icon">&#128269;</span>
      <input type="text" id="searchInput" placeholder="Cari build atau material..." />
    </div>

    <div class="header-actions">
      <button class="btn-icon" id="themeToggle" title="Toggle Dark/Light Mode">Light</button>
      <button class="btn-icon" title="Tambah Build">+</button>
    </div>
  </header>

  <!-- ══ BODY ══ -->
  <div class="app-body">

    <!-- ── SIDEBAR ── -->
    <aside class="sidebar">
      <div class="sidebar-header">Builds</div>

      <div class="filter-tabs">
        <button class="filter-tab active" data-filter="all">All</button>
        <button class="filter-tab" data-filter="Megabuild">Mega</button>
        <button class="filter-tab" data-filter="Farm">Farm</button>
        <button class="filter-tab" data-filter="Storage">Storage</button>
        <button class="filter-tab" data-filter="Dekorasi">Deco</button>
      </div>

      <div class="build-list" id="buildList"></div>
    </aside>

    <!-- ── MAIN CONTENT ── -->
    <main class="content" id="mainContent"></main>

  </div>

  <!-- ══ FOOTER ══ -->
  <footer>
    <div>MinePlanner v1.0 — Data tersimpan di browser kamu</div>
    <div>Dibuat dengan <span>&#9829;</span> untuk builder Minecraft</div>
  </footer>

  <!-- ══ JAVASCRIPT ══ -->
  <script>
    // Helper: render img tag atau placeholder
    function imgOrPlaceholder(src, alt, cls) {
      if (src) {
        return `<img src="${src}" alt="${alt}" />`;
      }
      // Ambil 2 huruf pertama dari nama sebagai placeholder
      const initials = alt.substring(0, 2).toUpperCase();
      return `<div class="${cls}-placeholder">${initials}</div>`;
    }

    // ── DATA ──────────────────────────────────────────────
    // icon & mat.icon diisi path ke assets, contoh: "assets/builds/castle.png"
    // Kalau kosong/null, otomatis tampil placeholder teks
    const defaultBuilds = [
      {
        id: 1,
        nama: "Medieval Castle",
        kategori: "Megabuild",
        icon: null,           // ganti dengan: "assets/builds/castle.png"
        deskripsi: "Kastil megah gaya medieval dengan menara tinggi, jembatan gantung, dan ruang bawah tanah.",
        materials: [
          { nama: "Stone Brick",  dibutuhkan: 5000, terkumpul: 3200, icon: null },
          { nama: "Oak Log",      dibutuhkan: 800,  terkumpul: 800,  icon: null },
          { nama: "Glass Pane",   dibutuhkan: 400,  terkumpul: 150,  icon: null },
          { nama: "Lantern",      dibutuhkan: 120,  terkumpul: 80,   icon: null },
          { nama: "Iron Bar",     dibutuhkan: 300,  terkumpul: 50,   icon: null },
          { nama: "Cobblestone",  dibutuhkan: 2000, terkumpul: 2000, icon: null },
        ]
      },
      {
        id: 2,
        nama: "Auto Wheat Farm",
        kategori: "Farm",
        icon: null,
        deskripsi: "Farm gandum fully automatic menggunakan observer, piston, dan water flush system.",
        materials: [
          { nama: "Dirt",         dibutuhkan: 200, terkumpul: 200, icon: null },
          { nama: "Observer",     dibutuhkan: 64,  terkumpul: 30,  icon: null },
          { nama: "Piston",       dibutuhkan: 64,  terkumpul: 64,  icon: null },
          { nama: "Wheat Seed",   dibutuhkan: 200, terkumpul: 100, icon: null },
          { nama: "Hopper",       dibutuhkan: 32,  terkumpul: 10,  icon: null },
        ]
      },
      {
        id: 3,
        nama: "Item Sorting System",
        kategori: "Storage",
        icon: null,
        deskripsi: "Sistem sorting otomatis dengan chest besar, hopper chain, dan comparator untuk 30+ kategori item.",
        materials: [
          { nama: "Chest",        dibutuhkan: 120, terkumpul: 120, icon: null },
          { nama: "Hopper",       dibutuhkan: 240, terkumpul: 180, icon: null },
          { nama: "Comparator",   dibutuhkan: 80,  terkumpul: 40,  icon: null },
          { nama: "Redstone",     dibutuhkan: 500, terkumpul: 500, icon: null },
          { nama: "Smooth Stone", dibutuhkan: 300, terkumpul: 300, icon: null },
        ]
      },
      {
        id: 4,
        nama: "Japanese Garden",
        kategori: "Dekorasi",
        icon: null,
        deskripsi: "Taman gaya Jepang dengan jembatan kayu, batu stepping, lantern, dan kolam koi.",
        materials: [
          { nama: "Cherry Log",   dibutuhkan: 200, terkumpul: 50,  icon: null },
          { nama: "Bamboo",       dibutuhkan: 300, terkumpul: 300, icon: null },
          { nama: "Stone Slab",   dibutuhkan: 150, terkumpul: 80,  icon: null },
          { nama: "Lily Pad",     dibutuhkan: 40,  terkumpul: 10,  icon: null },
          { nama: "Lantern",      dibutuhkan: 30,  terkumpul: 5,   icon: null },
        ]
      },
    ];

    // ── STATE ─────────────────────────────────────────────
    let builds = JSON.parse(localStorage.getItem('mc_builds') || 'null') || defaultBuilds;
    let activeId = builds[0].id;
    let activeFilter = 'all';

    function save() {
      localStorage.setItem('mc_builds', JSON.stringify(builds));
    }

    function calcProgress(build) {
      const total = build.materials.reduce((s, m) => s + m.dibutuhkan, 0);
      const collected = build.materials.reduce((s, m) => s + Math.min(m.terkumpul, m.dibutuhkan), 0);
      return total === 0 ? 0 : Math.round((collected / total) * 100);
    }

    // ── SIDEBAR ───────────────────────────────────────────
    function renderSidebar() {
      const list = document.getElementById('buildList');
      const query = document.getElementById('searchInput').value.toLowerCase();

      const filtered = builds.filter(b => {
        const matchFilter = activeFilter === 'all' || b.kategori === activeFilter;
        const matchSearch = b.nama.toLowerCase().includes(query);
        return matchFilter && matchSearch;
      });

      list.innerHTML = filtered.map(b => {
        const pct = calcProgress(b);
        const iconHTML = b.icon
          ? `<img src="${b.icon}" alt="${b.nama}" />`
          : `<div class="icon-placeholder">${b.nama.substring(0,2).toUpperCase()}</div>`;
        return `
          <div class="build-item ${b.id === activeId ? 'active' : ''}" data-id="${b.id}">
            <div class="build-icon">${iconHTML}</div>
            <div class="build-item-info">
              <div class="build-item-name">${b.nama}</div>
              <div class="build-item-cat">${b.kategori}</div>
              <div class="progress-mini">
                <div class="progress-mini-fill" style="width:${pct}%"></div>
              </div>
            </div>
          </div>`;
      }).join('');

      list.querySelectorAll('.build-item').forEach(el => {
        el.addEventListener('click', () => {
          activeId = +el.dataset.id;
          renderSidebar();
          renderMain();
        });
      });
    }

    // ── MAIN CONTENT ──────────────────────────────────────
    function renderMain() {
      const build = builds.find(b => b.id === activeId);
      if (!build) return;

      const pct = calcProgress(build);
      const totalMat = build.materials.length;
      const doneMat = build.materials.filter(m => m.terkumpul >= m.dibutuhkan).length;

      const previewHTML = build.icon
        ? `<img src="${build.icon}" alt="${build.nama}" />`
        : `<div class="img-placeholder">
             <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
               <rect x="3" y="3" width="18" height="18" rx="2"/>
               <circle cx="8.5" cy="8.5" r="1.5"/>
               <path d="M21 15l-5-5L5 21"/>
             </svg>
             <span>No Image</span>
           </div>`;

      const matHTML = build.materials.map((m, i) => {
        const matPct = Math.min(100, Math.round((m.terkumpul / m.dibutuhkan) * 100));
        const done = m.terkumpul >= m.dibutuhkan;
        const matIconHTML = m.icon
          ? `<img src="${m.icon}" alt="${m.nama}" />`
          : `<div class="mat-icon-placeholder">${m.nama.substring(0,2).toUpperCase()}</div>`;
        return `
          <div class="material-card ${done ? 'done' : ''}" data-build="${build.id}" data-mat="${i}">
            <div class="mat-checkbox">${done ? '&#10003;' : ''}</div>
            <div class="mat-icon">${matIconHTML}</div>
            <div class="mat-info">
              <div class="mat-name">${m.nama}</div>
              <div class="mat-qty"><b>${m.terkumpul.toLocaleString()}</b> / ${m.dibutuhkan.toLocaleString()} unit</div>
            </div>
            <div class="mat-bar-wrap">
              <div class="mat-bar-track">
                <div class="mat-bar-fill" style="width:${matPct}%"></div>
              </div>
              <div class="mat-bar-pct">${matPct}%</div>
            </div>
          </div>`;
      }).join('');

      document.getElementById('mainContent').innerHTML = `
        <div class="build-header">
          <div class="preview-image">${previewHTML}</div>
          <div class="build-meta">
            <div class="build-title">${build.nama}</div>
            <div class="build-category">${build.kategori}</div>
            <div class="build-desc">${build.deskripsi}</div>
            <div class="progress-container">
              <div class="progress-label">
                <span>Progress Keseluruhan</span>
                <span>${pct}%</span>
              </div>
              <div class="progress-track">
                <div class="progress-fill" style="width:${pct}%"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-label">Progress</div>
            <div class="stat-value">${pct}%</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Material</div>
            <div class="stat-value">${doneMat}/${totalMat}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Total Item</div>
            <div class="stat-value">${build.materials.reduce((s,m)=>s+m.dibutuhkan,0).toLocaleString()}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Kategori</div>
            <div class="stat-value" style="font-size:.8rem;color:var(--accent2)">${build.kategori}</div>
          </div>
        </div>

        <div>
          <div class="section-title">Material Checklist</div>
          <div class="material-list">${matHTML}</div>
        </div>
      `;

      document.querySelectorAll('.material-card').forEach(card => {
        card.addEventListener('click', () => {
          const bId = +card.dataset.build;
          const mIdx = +card.dataset.mat;
          const b = builds.find(x => x.id === bId);
          const m = b.materials[mIdx];
          m.terkumpul = m.terkumpul >= m.dibutuhkan ? 0 : m.dibutuhkan;
          save();
          renderSidebar();
          renderMain();
        });
      });
    }

    // ── FILTER TABS ───────────────────────────────────────
    document.querySelectorAll('.filter-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.filter;
        renderSidebar();
      });
    });

    // ── SEARCH ────────────────────────────────────────────
    document.getElementById('searchInput').addEventListener('input', renderSidebar);

    // ── THEME TOGGLE ─────────────────────────────────────
    const themeToggle = document.getElementById('themeToggle');
    const savedTheme = localStorage.getItem('mc_theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
    themeToggle.textContent = savedTheme === 'dark' ? 'Light' : 'Dark';

    themeToggle.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      themeToggle.textContent = next === 'dark' ? 'Light' : 'Dark';
      localStorage.setItem('mc_theme', next);
    });

    // ── INIT ──────────────────────────────────────────────
    renderSidebar();
    renderMain();
  </script>
</body>
</html>
