<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MinePlanner — Build Tracker</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ══ HEADER ══ -->
  <header>
    <div class="logo">Mine<span>Planner</span></div>

    <div class="search-bar">
      <span class="icon">&#128269;</span>
      <input type="text" id="searchInput" placeholder="Cari build atau material..." />
    </div>

    <div class="header-actions">
      <button class="btn-icon" id="themeToggle" title="Toggle Dark/Light Mode">
        Light
      </button>

      <button class="btn-icon" title="Tambah Build">
        +
      </button>
    </div>
  </header>

  <!-- ══ BODY ══ -->
  <div class="app-body">

    <!-- ── SIDEBAR ── -->
    <aside class="sidebar">

      <div class="sidebar-header">
        Builds
      </div>

      <div class="filter-tabs">
        <button class="filter-tab active" data-filter="all">All</button>
        <button class="filter-tab" data-filter="Megabuild">Mega</button>
        <button class="filter-tab" data-filter="Farm">Farm</button>
        <button class="filter-tab" data-filter="Storage">Storage</button>
        <button class="filter-tab" data-filter="Dekorasi">Deco</button>
      </div>

      <div class="build-list" id="buildList"></div>

    </aside>

    <!-- ── MAIN CONTENT ── -->
    <main class="content" id="mainContent"></main>

  </div>

  <!-- ══ FOOTER ══ -->
  <footer>
    <div>
      MinePlanner v1.0 — Data tersimpan di browser kamu
    </div>

    <div>
      Dibuat dengan <span>&#9829;</span> untuk builder Minecraft
    </div>
  </footer>

  <script src="script.js"></script>

</body>
</html>
