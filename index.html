<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AeRuxxy - Build Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══ HEADER ══ -->
  <header>
    <div class="logo">AeRuxxy<span>Planner</span></div>

    <div class="search-bar">
      <span class="icon">&#128269;</span>
      <input type="text" id="searchInput" placeholder="Cari build..." />
    </div>

    <div class="header-actions">
      <button class="btn-icon" id="themeToggle" title="Toggle Dark/Light Mode">Light</button>
      <button class="btn-icon" id="btnAddBuild" title="Tambah Build">+</button>
    </div>
  </header>

  <!-- ══ BODY ══ -->
  <div class="app-body">

    <!-- ── SIDEBAR ── -->
    <aside class="sidebar">
      <div class="sidebar-header">Builds</div>

      <div class="filter-tabs">
        <button class="filter-tab active" data-filter="all">All</button>
        <button class="filter-tab" data-filter="Megabuild">Mega</button>
        <button class="filter-tab" data-filter="Farm">Farm</button>
        <button class="filter-tab" data-filter="Redstone">Redstone</button>
        <button class="filter-tab" data-filter="Storage">Storage</button>
        <button class="filter-tab" data-filter="Dekorasi">Deco</button>
        <button class="filter-tab" data-filter="Lainnya">Lainnya</button>
        
      </div>

      <div class="build-list" id="buildList"></div>
    </aside>

    <!-- ── MAIN CONTENT ── -->
    <main class="content" id="mainContent"></main>

  </div>

  <!-- ══ FOOTER ══ -->
  <footer>
  <div>AeRuxxy Build Planner</div>
    <a href="https://github.com/AeRuxxy/MinecraftBuildTracker/" target="_blank" rel="noopener noreferrer" class="btn-github">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
      </svg>
    GitHub
    </a>
  </footer>

  <!-- ══ MODAL: PILIH METODE ══ -->
  <div class="modal-overlay hidden" id="modalChoose">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title">&#43; Tambah Build Baru</span>
        <button class="modal-close" id="modalChooseClose">&#10005;</button>
      </div>
      <div class="modal-body">
        <div class="method-grid">
          <div class="method-card" id="chooseManual">
            <div class="mc-icon">&#9997;&#65039;</div>
            <div class="mc-label">Input Manual</div>
            <div class="mc-desc">Masukkan nama build dan daftar material satu per satu secara manual.</div>
          </div>
          <div class="method-card" id="chooseSchematic">
            <div class="mc-icon">&#128196;</div>
            <div class="mc-label">Import Schematic</div>
            <div class="mc-desc">Upload file .schematic atau .nbt untuk otomatis membaca daftar material.</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ══ MODAL: INPUT MANUAL ══ -->
  <div class="modal-overlay hidden" id="modalManual">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title">&#9997;&#65039; Input Manual</span>
        <button class="modal-close" id="modalManualClose">&#10005;</button>
      </div>
      <div class="modal-body" id="modalManualBody">
        <!-- diisi oleh manual-add.js -->
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="modalManualCancel">Batal</button>
        <button class="btn-primary" id="modalManualSave">&#10003; Simpan Build</button>
      </div>
    </div>
  </div>

  <!-- ══ MODAL: IMPORT SCHEMATIC ══ -->
  <div class="modal-overlay hidden" id="modalSchematic">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title">&#128196; Import Schematic</span>
        <button class="modal-close" id="modalSchematicClose">&#10005;</button>
      </div>
      <div class="modal-body" id="modalSchematicBody">
        <!-- diisi oleh schematic-import.js -->
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="modalSchematicCancel">Batal</button>
        <button class="btn-primary" id="modalSchematicImport" disabled>&#8659; Import Build</button>
      </div>
    </div>
  </div>

  <!-- ══ MODAL: EDIT BUILD ══ -->
  <div class="modal-overlay hidden" id="modalEditBuild">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title">&#9998; Edit Build</span>
        <button class="modal-close" id="modalEditBuildClose">&#10005;</button>
      </div>
      <div class="modal-body" id="modalEditBuildBody">
        <!-- diisi oleh edit-build.js -->
      </div>
      <div class="modal-footer" style="justify-content: space-between;">
        <button class="btn-danger" id="modalEditBuildDelete">&#128465; Hapus Build</button>
        <div style="display:flex;gap:.6rem;">
          <button class="btn-secondary" id="modalEditBuildCancel">Batal</button>
          <button class="btn-primary" id="modalEditBuildSave">&#10003; Simpan Perubahan</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ══ SCRIPTS ══ -->
  <!-- modul harus load sebelum script.js -->
  <script src="js/manual-add.js"></script>
  <script src="js/schematic-import.js"></script>
  <script src="js/edit-build.js"></script>
  <script src="script.js"></script>

</body>
</html>
